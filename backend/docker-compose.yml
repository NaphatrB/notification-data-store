services:
  db:
    image: postgres:15
    restart: unless-stopped
    command: 
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "autovacuum_vacuum_scale_factor=0.05"
      - "-c"
      - "autovacuum_analyze_scale_factor=0.02"
    environment:
      POSTGRES_USER: anla
      POSTGRES_PASSWORD: anla
      POSTGRES_DB: anla_db
    volumes:
      - ./pgdata:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anla -d anla_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: registry.buffalo-cliff.ts.net/anla-api:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://anla:anla@db:5432/anla_db}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      SESSION_SECRET: ${SESSION_SECRET}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      OIDC_FORCE_HTTPS: ${OIDC_FORCE_HTTPS:-true}
      INGESTION_PUBLIC_BASE_URL: ${INGESTION_PUBLIC_BASE_URL:-https://anla-api.buffalo-cliff.ts.net}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  parser:
    image: registry.buffalo-cliff.ts.net/anla-parser:latest
    build:
      context: .
      dockerfile: Dockerfile.parser
    environment:
      DATABASE_URL: postgresql+asyncpg://anla:anla@db:5432/anla_db
      RAW_DATABASE_URL: postgresql+asyncpg://anla:anla@db:5432/anla_db
      LLM_ENDPOINT: http://bigpc.buffalo-cliff.ts.net:11434
      PARSER_BATCH_SIZE: "10"
      PARSER_NAME: pricing_v1
      POLL_INTERVAL_SECONDS: "30"
      # Candidate filters (comma-separated, empty = accept all)
      PARSER_SOURCE_FILTER: "whatsapp"
      PARSER_PACKAGE_FILTER: ""
      PARSER_APP_FILTER: ""
      PARSER_TEXT_FILTER_ENABLED: "false"
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
